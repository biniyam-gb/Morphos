<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Morphos — Mathematical Visualization Studio</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">
  <header id="header">
    <div class="brand">
      <span class="brand-name">Morphos</span>
      <span class="brand-sub">mathematical visualization studio</span>
    </div>
    <div id="formula-bar" aria-live="polite">
      <span id="formula-text">Select a system from the left panel</span>
    </div>
    <div class="header-controls">
      <button id="btn-play"  class="hbtn" title="Play/Pause (Space)">&#9654;</button>
      <button id="btn-reset" class="hbtn" title="Reset (R)">&#8635;</button>
      <button id="btn-step"  class="hbtn" title="Step frame">&#9197;</button>
      <span id="hud-frame" class="mono small">f:0</span>
      <select id="size-select" aria-label="Canvas resolution">
        <option value="600">600x600</option>
        <option value="800" selected>800x800</option>
        <option value="1024">1024x1024</option>
      </select>
      <button id="btn-png" class="hbtn">PNG</button>
      <button id="btn-svg" class="hbtn">SVG</button>
    </div>
  </header>
  <div id="layout">
    <nav id="sidebar" aria-label="Mathematical systems">
      <div id="sidebar-inner"></div>
    </nav>
    <main id="canvas-area">
      <div id="canvas-wrap">
        <canvas id="canvas" width="800" height="800"
                aria-label="Mathematical visualization canvas"
                role="img" tabindex="0"></canvas>
      </div>
      <div id="statusbar" aria-live="polite">
        <span id="sb-coords" class="mono">x: --  y: --</span>
        <span id="sb-info"></span>
        <span id="sb-fps" class="mono">-- fps</span>
      </div>
    </main>
    <aside id="panel" aria-label="Parameters">
      <div id="panel-header">
        <div id="panel-sysname"></div>
        <div id="panel-domain" class="panel-domain-label"></div>
      </div>
      <div id="panel-desc"></div>
      <div id="controls"></div>
    </aside>
  </div>
</div>
<script type="module" src="js/app.js"></script>
</body>
</html>
